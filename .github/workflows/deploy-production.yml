name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY" to confirm production deployment'
        required: true
        type: string
      skip_destructive_check:
        description: 'Override destructive-migration safeguard (requires dual sign-off)'
        required: false
        default: 'no'
        type: choice
        options: ['no', 'yes']

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  guard:
    name: Guard — confirmation + destructive migrations
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify confirmation string
        if: ${{ github.event.inputs.confirm != 'DEPLOY' }}
        run: |
          echo "::error::Input 'confirm' must be exactly 'DEPLOY'."
          exit 1

      - name: Check for destructive migration statements
        id: destructive
        run: |
          set -e
          PATTERNS='DROP TABLE|DROP COLUMN|DROP INDEX|TRUNCATE'
          CHANGED_SQL=$(git diff --name-only origin/main..HEAD -- 'supabase/migrations/*.sql' || true)
          FOUND=""
          if [ -n "$CHANGED_SQL" ]; then
            FOUND=$(grep -iE "$PATTERNS" $CHANGED_SQL || true)
          fi
          if [ -n "$FOUND" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
            echo "::warning::Destructive migration detected:"
            echo "$FOUND"
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Decide
        id: decide
        run: |
          if [ "${{ steps.destructive.outputs.found }}" = "true" ] && [ "${{ github.event.inputs.skip_destructive_check }}" != "yes" ]; then
            echo "::error::Destructive migrations present but override not set. Re-run with skip_destructive_check=yes after dual sign-off."
            exit 1
          fi
          echo "proceed=true" >> $GITHUB_OUTPUT

  deploy:
    name: Deploy
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      - name: Type + tests
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          npx tsc --noEmit
          npx vitest run

      - name: Build (production)
        env:
          NODE_OPTIONS: --max-old-space-size=8192
          VITE_SUPABASE_URL: ${{ secrets.PRODUCTION_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.PRODUCTION_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.PRODUCTION_SENTRY_DSN }}
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Supabase backup (pre-deploy)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.PRODUCTION_SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
        run: |
          # Supabase's own backup schedule runs; this step triggers a named
          # on-demand snapshot tagged with the deploy SHA so we can identify
          # the exact pre-deploy state if we need to roll back.
          echo "Pre-deploy snapshot tag: pre-${{ github.sha }}"
          # Placeholder — replace with `supabase db dump` or the Management API
          # call once the ops runbook is finalized.

      - name: Apply Supabase migrations (production)
        uses: supabase/setup-cli@v2
        with:
          version: latest
      - name: Push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.PRODUCTION_SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy frontend (blue-green via alias swap)
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: dist
          production-deploy: true
          deploy-message: "Production ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PRODUCTION_NETLIFY_SITE_ID }}

      - name: Health check
        run: |
          URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$URL" ]; then
            echo "PRODUCTION_URL not configured — skipping health check"
            exit 0
          fi
          for i in 1 2 3 4 5 6; do
            if curl -sSf -o /dev/null "$URL"; then
              echo "Production up (attempt $i)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Production health check failed — initiate rollback."
          exit 1

      - name: Sentry release tracking
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        uses: getsentry/action-release@v1
        with:
          environment: production
          version: ${{ github.sha }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
